<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messages | GLAND Portfolio Admin</title>
    <link rel="stylesheet" href="assets/css/admin.css">
</head>
<body>
    <div class="gland-admin-shell">
        <aside class="gland-sidebar">
            <div class="gland-brand">
                <div class="gland-brand-mark">G</div>
                <div>
                    <h1 class="gland-brand-title">GLAND Admin</h1>
                    <p class="gland-brand-subtitle">Portfolio CMS</p>
                </div>
            </div>

            <nav class="gland-nav" aria-label="Admin navigation">
                <a href="messages.html" class="is-active">Messages</a>
                <a href="dashboard.html">Dashboard</a>
                <a href="page-editor.html">Page Editor</a>
                <a href="media.html">Media</a>
                <a href="analytics.html">Analytics</a>
                <a href="settings.html">Settings</a>
            </nav>
        </aside>

        <main class="gland-main">
            <header class="gland-page-header">
                <div>
                    <p class="gland-kicker">Contact Inbox</p>
                    <h2 class="gland-page-title">Messages</h2>
                    <p class="gland-page-description">
                        Manage contact messages stored in MySQL. Mark leads as read, approved,
                        rejected, archived, or delete spam when civilization disappoints us again.
                    </p>
                </div>

                <div class="gland-toolbar">
                    <button class="gland-button" type="button" data-refresh-messages>
                        Refresh
                    </button>
                </div>
            </header>

            <p class="gland-page-description" data-page-status></p>

            <section class="gland-message-list" data-message-list aria-live="polite">
                <div class="gland-card gland-empty">
                    Loading messages from MySQL...
                </div>
            </section>
        </main>
    </div>

    <script src="assets/js/messages.js"></script>
</body>
</html>
