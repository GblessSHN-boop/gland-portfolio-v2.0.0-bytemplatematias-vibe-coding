<form class="gland-panel" data-singleton-api="/api/site-identity">
    <div class="gland-panel-header">
        <h2 class="gland-panel-title">Brand & SEO</h2>
    </div>
    <div class="gland-panel-body">
        <div class="gland-form-grid">
            <div class="gland-field span-2"><label>Site Title</label><input name="site_title" placeholder="Gland Siahaan | AI Engineer"></div>
            <div class="gland-field span-2"><label>Meta Description</label><textarea name="meta_description" placeholder="SEO description"></textarea></div>
            <div class="gland-field span-2"><label>Canonical URL</label><input name="canonical_url" placeholder="https://..."></div>
            <div class="gland-field"><label>Logo Path</label><input name="logo_path" placeholder="assets/img/logo/..."></div>
            <div class="gland-field"><label>Header Icon Path</label><input name="header_icon_path" placeholder="assets/img/logo/..."></div>
            <div class="gland-field"><label>Favicon Path</label><input name="favicon_path" placeholder="assets/img/logo/favicon.png"></div>
            <div class="gland-field"><label>Preloader Text</label><input name="preloader_text" placeholder="GLAND"></div>
            <div class="gland-field span-2"><label>YouTube URL</label><input name="youtube_url" placeholder="https://youtube.com/..."></div>
            <div class="gland-field span-2"><label>GitHub URL</label><input name="github_url" placeholder="https://github.com/..."></div>
            <div class="gland-field span-2"><label>Instagram URL</label><input name="instagram_url" placeholder="https://instagram.com/..."></div>
            <div class="gland-field span-2"><label>LinkedIn URL</label><input name="linkedin_url" placeholder="https://linkedin.com/..."></div>
        </div>
        <div class="gland-form-actions">
            <button class="gland-btn gland-btn-primary" type="submit">Save Site Identity</button>
        </div>
    </div>
</form>
