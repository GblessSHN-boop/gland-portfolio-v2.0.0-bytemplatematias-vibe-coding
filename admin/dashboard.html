<!DOCTYPE html>
<html lang="en" class="h-full bg-zinc-950">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Overview | GLAND Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = { theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] } } } }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
    <link rel="stylesheet" href="assets/css/admin-clean-v3.css">
</head>
<body class="h-full text-zinc-100 antialiased flex">
    <aside class="w-64 bg-zinc-900/50 border-r border-zinc-800 flex flex-col fixed h-full z-10 backdrop-blur-xl">
        <div class="p-6">
            <div class="flex items-center gap-3 mb-10">
                <div class="w-9 h-9 rounded-xl bg-lime-400 flex items-center justify-center font-bold text-black shadow-[0_0_15px_rgba(163,230,53,0.3)]">G</div>
                <div><h2 class="text-sm font-bold text-white">GLAND Admin</h2><p class="text-[10px] uppercase tracking-widest text-zinc-500">Portfolio CMS</p></div>
            </div>
            <nav class="space-y-1">
                <a href="#" class="flex items-center gap-3 px-4 py-2.5 text-sm font-medium text-zinc-400 hover:text-white hover:bg-zinc-800/50 rounded-lg transition-all">Messages</a>
                <a href="#" class="flex items-center gap-3 px-4 py-2.5 text-sm font-medium text-zinc-400 hover:text-white hover:bg-zinc-800/50 rounded-lg transition-all">Projects</a>
                <a href="#" class="flex items-center gap-3 px-4 py-2.5 text-sm font-semibold text-lime-400 bg-zinc-800/80 rounded-lg border border-zinc-700/50 shadow-sm">Dashboard</a>
            </nav>
        </div>
    </aside>

    <main class="flex-1 min-h-screen pl-64">
        <div class="max-w-5xl mx-auto px-8 py-10">
            <header class="mb-10">
                <h1 class="text-3xl font-bold text-white tracking-tight">Dashboard</h1>
                <p class="text-zinc-500 mt-1">Selamat datang kembali, Gland.</p>
            </header>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="group bg-zinc-900 border border-zinc-800 p-6 rounded-2xl hover:border-zinc-700 transition-all duration-300">
                    <h3 class="text-[11px] font-bold uppercase tracking-wider text-zinc-500">Total Views</h3>
                    <p class="text-4xl font-bold text-white mt-3 group-hover:text-lime-400 transition-colors">1,248</p>
                </div>
                <div class="group bg-zinc-900 border border-zinc-800 p-6 rounded-2xl hover:border-zinc-700 transition-all duration-300">
                    <h3 class="text-[11px] font-bold uppercase tracking-wider text-zinc-500">Unread Msgs</h3>
                    <p class="text-4xl font-bold text-white mt-3 group-hover:text-lime-400 transition-colors">4</p>
                </div>
                <div class="group bg-zinc-900 border border-zinc-800 p-6 rounded-2xl hover:border-zinc-700 transition-all duration-300">
                    <h3 class="text-[11px] font-bold uppercase tracking-wider text-zinc-500">Projects</h3>
                    <p class="text-4xl font-bold text-white mt-3 group-hover:text-lime-400 transition-colors">12</p>
                </div>
            </div>
        </div>
    </main>
    <script src="assets/js/admin-clean-v3.js"></script>
</body>
</html>
