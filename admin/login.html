<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login | GLAND Portfolio</title>

  <style>
    :root {
      --bg: #08090b;
      --panel: #171719;
      --panel-2: #101114;
      --text: #ffffff;
      --muted: #b9beca;
      --line: rgba(255, 255, 255, 0.12);
      --line-strong: rgba(255, 255, 255, 0.18);
      --accent: #9dff00;
      --danger: #ff7b92;
      --warning: #ffd166;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 42px 20px;
      background:
        radial-gradient(circle at top left, rgba(157, 255, 0, 0.10), transparent 32%),
        radial-gradient(circle at bottom right, rgba(115, 183, 255, 0.08), transparent 28%),
        var(--bg);
      color: var(--text);
      font-family: "GlandAdminLocal", "Inter", "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, Arial, sans-serif;
    }

    .login-shell {
      width: min(760px, 100%);
    }

    .login-header {
      margin-bottom: 26px;
    }

    .eyebrow {
      margin: 0 0 14px;
      color: var(--muted);
      font-size: 13px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      font-weight: 700;
    }

    h1 {
      margin: 0 0 14px;
      font-size: clamp(42px, 6vw, 64px);
      line-height: 1.08;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    .description {
      margin: 0;
      color: var(--muted);
      line-height: 1.8;
      font-size: 17px;
    }

    .login-card {
      width: 100%;
      padding: 30px;
      border: 1px solid var(--line);
      border-radius: 24px;
      background: rgba(23, 23, 25, 0.96);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.34);
    }

    label {
      display: block;
      margin: 0 0 10px;
      font-size: 14px;
      color: var(--muted);
      font-weight: 700;
      letter-spacing: 0.01em;
    }

    input {
      width: 100%;
      min-height: 54px;
      margin: 0 0 22px;
      padding: 0 16px;
      border: 1px solid var(--line-strong);
      border-radius: 13px;
      background: #eef5ff;
      color: #111827;
      outline: none;
      font-size: 16px;
      font-family: inherit;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(157, 255, 0, 0.10);
    }

    input:disabled {
      opacity: 0.76;
      cursor: not-allowed;
    }

    .primary-button,
    .secondary-button {
      width: 100%;
      min-height: 54px;
      border-radius: 13px;
      cursor: pointer;
      font-size: 15.5px;
      font-weight: 800;
      font-family: inherit;
    }

    .primary-button {
      border: 0;
      background: var(--accent);
      color: #111111;
    }

    .primary-button:disabled {
      opacity: 0.72;
      cursor: not-allowed;
    }

    .secondary-button {
      margin: -4px 0 18px;
      border: 1px solid var(--line);
      background: transparent;
      color: var(--muted);
    }

    .secondary-button:hover {
      color: var(--accent);
      border-color: rgba(157, 255, 0, 0.4);
    }

    .verification-step {
      margin-top: 4px;
      padding-top: 6px;
    }

    .verification-step[hidden] {
      display: none !important;
    }

    .verification-hint {
      margin: -8px 0 18px;
      color: var(--muted);
      font-size: 13.5px;
      line-height: 1.65;
    }

    .debug-code {
      display: block;
      margin-top: 12px;
      padding: 12px 14px;
      border: 1px solid rgba(157, 255, 0, 0.28);
      border-radius: 13px;
      background: rgba(157, 255, 0, 0.10);
      color: var(--accent);
      word-break: break-word;
    }

    .message {
      min-height: 24px;
      margin-top: 18px;
      color: var(--danger);
      font-size: 14px;
      line-height: 1.6;
    }

    .message.is-success {
      color: var(--accent);
    }

    .message.is-warning {
      color: var(--warning);
    }

    .message.is-danger {
      color: var(--danger);
    }

    .links {
      display: grid;
      gap: 14px;
      margin-top: 28px;
    }

    .back-link {
      color: var(--muted);
      text-decoration: none;
      font-size: 14px;
      line-height: 1.4;
    }

    .back-link:hover {
      color: var(--accent);
    }

    @media (max-width: 640px) {
      body {
        place-items: start center;
        padding: 28px 16px;
      }

      .login-card {
        padding: 22px;
      }

      h1 {
        font-size: 40px;
      }
    }
  </style>
</head>
<body>
  <main class="login-shell">
    <header class="login-header">
      <p class="eyebrow">GLAND CMS</p>
      <h1>Admin Login</h1>
      <p class="description">Sign in to manage portfolio content, messages, media, and analytics.</p>
    </header>

    <section class="login-card">
      <form id="adminLoginForm" autocomplete="on">
        <label for="username">Username or Email</label>
        <input id="username" name="username" type="text" autocomplete="username" required />

        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required />

        <div id="loginVerificationStep" class="verification-step" hidden>
          <label for="verificationCode">6-Digit Verification Code</label>
          <input
            id="verificationCode"
            name="verificationCode"
            type="text"
            inputmode="numeric"
            autocomplete="one-time-code"
            maxlength="6"
            pattern="[0-9]{6}"
            placeholder="000000"
          />
          <p class="verification-hint" id="verificationHint">Enter the code sent to your admin email.</p>
          <button class="secondary-button" id="restartLoginButton" type="button">Use another account</button>
        </div>

        <button id="loginButton" class="primary-button" type="submit">Login</button>

        <div id="loginMessage" class="message is-danger" aria-live="polite"></div>
      </form>
    </section>

    <nav class="links" aria-label="Login links">
      <a class="back-link" href="/admin/forgot-password.html">Forgot password?</a>
      <a class="back-link" href="../index.html">Back to portfolio</a>
    </nav>
  </main>

  <script src="assets/js/auth.js?v=loginfix-20260621161450"></script>
</body>
</html>
