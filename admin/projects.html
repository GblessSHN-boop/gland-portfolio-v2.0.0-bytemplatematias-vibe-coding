        <main class="gland-main">
            <div class="gland-container">
                <header class="gland-page-header">
                    <div>
                        <p class="gland-eyebrow">Portfolio CMS</p>
                        <h1 class="gland-title">Projects</h1>
                        <p class="gland-subtitle">Create, edit, and manage portfolio projects with a clean dashboard layout.</p>
                    </div>

                    <button type="button" class="gland-btn" data-refresh-page>
                        <i class="ti ti-refresh me-2"></i> Refresh
                    </button>
                </header>

                <p class="gland-status-text" id="projectsStatus">Loading projects...</p>

<section class="gland-crud-layout">
    <form class="gland-panel" id="projectForm">
        <div class="gland-panel-header">
            <h2 class="gland-panel-title" id="projectFormTitle">Create Project</h2>
        </div>

        <div style="padding:22px;">
            <input type="hidden" id="projectId">

            <div class="gland-form-grid">
                <div class="gland-field">
                    <label for="projectTitle">Project Title</label>
                    <input id="projectTitle" required placeholder="Portfolio Website">
                </div>

                <div class="gland-field">
                    <label for="projectCategory">Category</label>
                    <input id="projectCategory" placeholder="Web Development">
                </div>

                <div class="gland-field span-2">
                    <label for="projectDescription">Description</label>
                    <textarea id="projectDescription" placeholder="Short project description"></textarea>
                </div>

                <div class="gland-field">
                    <label for="projectImagePath">Image Path</label>
                    <input id="projectImagePath" placeholder="assets/img/project/example.png">
                </div>

                <div class="gland-field">
                    <label for="projectTechnologies">Technologies</label>
                    <input id="projectTechnologies" placeholder="HTML, CSS, JavaScript">
                </div>

                <div class="gland-field">
                    <label for="projectUrl">Project URL</label>
                    <input id="projectUrl" placeholder="https://example.com">
                </div>

                <div class="gland-field">
                    <label for="projectRepositoryUrl">Repository URL</label>
                    <input id="projectRepositoryUrl" placeholder="https://github.com/...">
                </div>

                <div class="gland-field">
                    <label for="projectDisplayOrder">Display Order</label>
                    <input id="projectDisplayOrder" type="number" value="0">
                </div>

                <div class="gland-field">
                    <label for="projectIsFeatured">Featured</label>
                    <select id="projectIsFeatured">
                        <option value="0">No</option>
                        <option value="1">Yes</option>
                    </select>
                </div>

                <div class="gland-field">
                    <label for="projectIsActive">Active</label>
                    <select id="projectIsActive">
                        <option value="1">Yes</option>
                        <option value="0">No</option>
                    </select>
                </div>
            </div>

            <div class="gland-form-actions">
                <button type="submit" class="gland-btn gland-btn-primary" id="projectSubmitButton">Create Project</button>
                <button type="button" class="gland-btn gland-btn-secondary" id="projectResetButton">Reset</button>
            </div>
        </div>
    </form>

    <section class="gland-panel">
        <div class="gland-panel-header">
            <h2 class="gland-panel-title">Project List</h2>
        </div>

        <div style="padding:22px;">
            <div class="gland-list" id="projectsList"></div>
        </div>
    </section>
</section>
            </div>
        </main>
    </div>

<script src="assets/js/projects-tabler.js"></script>
