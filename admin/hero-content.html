</head>
<body>
    <div class="gland-page">
        <aside class="gland-sidebar">
    <div class="gland-brand">
        <div class="gland-brand-mark">G</div>
        <div>
            <p class="gland-brand-title">GLAND Admin</p>

        </div>
    </div>

    <nav class="gland-nav" aria-label="Admin navigation">

        <a data-admin-nav class="gland-nav-link" href="highlights.html"><i class="ti ti-sparkles"></i> Highlights</a>
        <a data-admin-nav class="gland-nav-link" href="personal-info.html"><i class="ti ti-user"></i> Personal Info</a>

        <a data-admin-nav class="gland-nav-link" href="site-identity.html"><i class="ti ti-id"></i> Site Identity</a>
        <a data-admin-nav class="gland-nav-link" href="dashboard.html"><i class="ti ti-dashboard"></i> Dashboard</a>

        <a data-admin-nav class="gland-nav-link" href="page-editor.html"><i class="ti ti-file-pencil"></i> Page Editor</a>
        <a data-admin-nav class="gland-nav-link" href="media.html"><i class="ti ti-photo"></i> Media</a>

    </nav>

    <div class="gland-sidebar-footer">
        <button type="button" class="gland-btn w-100" data-admin-logout>
            <i class="ti ti-logout me-2"></i> Sign Out
        </button>
    </div>
</aside>

        <main class="gland-main">
            <div class="gland-container">
                <header class="gland-page-header">
                    <div>
                        <p class="gland-eyebrow">Hero Section CMS</p>
                        <h1 class="gland-title">Hero Content</h1>
                        <p class="gland-subtitle">Manage hero title, description, availability, intro video, and media.</p>
                    </div>

                    <button type="button" class="gland-btn" data-refresh-page>
                        <i class="ti ti-refresh me-2"></i> Refresh
                    </button>
                </header>

                <p class="gland-status-text" data-page-status>Loading hero content...</p>

<form class="gland-panel" data-singleton-api="/api/hero-content">
    <div class="gland-panel-header">
        <h2 class="gland-panel-title">Hero Content</h2>
    </div>
    <div class="gland-panel-body">
        <div class="gland-form-grid">
            <div class="gland-field"><label>Eyebrow</label><input name="eyebrow" placeholder="Hello, I'm Gland"></div>
            <div class="gland-field"><label>Phone</label><input name="phone" placeholder="+62..."></div>
            <div class="gland-field"><label>Title Line 1</label><input name="title_line_1" placeholder="AI Engineer"></div>
            <div class="gland-field"><label>Title Line 2</label><input name="title_line_2" placeholder="Creative Designer"></div>
            <div class="gland-field span-2"><label>Description</label><textarea name="description" placeholder="Hero description"></textarea></div>
            <div class="gland-field"><label>Availability Text</label><input name="availability_text" placeholder="Available for projects"></div>
            <div class="gland-field"><label>Availability Location</label><input name="availability_location" placeholder="Worldwide"></div>
            <div class="gland-field span-2"><label>Intro Video URL</label><input name="intro_video_url" placeholder="https://youtube.com/..."></div>
            <div class="gland-field span-2"><label>Hero Media Path</label><input name="hero_media_path" placeholder="assets/video/..."></div>
        </div>
        <div class="gland-form-actions">
            <button class="gland-btn gland-btn-primary" type="submit">Save Hero Content</button>
        </div>
    </div>
</form>
            </div>
        </main>
    </div>

    <script src="assets/js/admin-auth-guard.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tabler/core@1.4.0/dist/js/tabler.min.js"></script>
<script src="assets/js/singleton-tabler.js"></script>
    <script src="assets/js/admin-tabler-shell.js"></script>
